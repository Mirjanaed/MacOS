site_name: Portail
theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: black
      accent: indigo
    - scheme: slate
      primary: black
      accent: indigo
  features:
    - navigation.tabs
    - content.code.copy
    - navigation.sections
    - content.tabs.link

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.magiclink

nav:
  - Accueil: index.md
  - Installation Bash: installation.md
  - Projets: projets.md